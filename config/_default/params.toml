colorScheme = "ocean"
defaultAppearance = "light"
autoSwitchAppearance = false

enableSearch = false
enableCodeCopy = true

disableImageOptimization = false
disableTextInHeader = false
disableImageZoom = true

[header]
  layout = "fixed"

[footer]
  showMenu = false
  showCopyright = false
  showThemeAttribution = false
  showAppearanceSwitcher = false
  showScrollToTop = false

[homepage]
  layout = "custom"
  showRecent = false
  cardView = false

[article]
  showDate = true
  showDateUpdated = true
  showAuthor = false
  showHero = false
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  showWordCount = false
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = false
  showRelated = false
  showSummary = true

[list]
  showHero = false
  showBreadcrumbs = true
  showSummary = true
  showCards = true
  cardView = true
  groupByYear = true
  showTableOfContents = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showBreadcrumbs = true
  cardView = true

[term]
  showBreadcrumbs = true
  cardView = true
  showTableOfContents = false

[verification]
  # google = ""


# ヘッダーCTA
