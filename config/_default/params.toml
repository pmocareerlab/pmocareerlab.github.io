  url = "/posts/"

# ヒーローCTA
[heroCta]
  primaryLabel = "おすすめ転職エージェントを見る"
  primaryUrl = "/posts/"
  secondaryLabel = "記事を探す"
  secondaryUrl = "/posts/"
