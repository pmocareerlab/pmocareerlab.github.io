<!doctype html>
<html lang="{{ with site.Params.isoCode | default (site.Language.Locale | default `ja`) }}{{- . -}}{{ end }}">
  {{- partial "head.html" . -}}
  {{- partialCached "init.html" . -}}
  <body>
    {{- partial "announcement-bar.html" . -}}
    {{- partial "header/fixed.html" . -}}
    <main id="main-content">
      {{ block "main" . }}{{ end }}
    </main>
    {{- partial "footer.html" . -}}
  </body>
</html>
